<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Orbit Shift Template</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        color: #f8fbff;
        background: #060910;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      .hud {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: space-between;
        padding: 22px;
        pointer-events: none;
        color: #d9f7ff;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .help {
        position: fixed;
        left: 50%;
        bottom: 24px;
        padding: 9px 14px;
        color: #061018;
        background: #51d8ff;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        pointer-events: none;
        transform: translateX(-50%);
      }
    </style>
  </head>
  <body>
    <canvas id="game" aria-label="Orbit Shift template game"></canvas>
    <div class="hud"><span>Orbit Shift</span><span id="score">Score 000</span></div>
    <div class="help" id="help">Space / click / tap to switch orbit</div>
    <script>
      const canvas = document.getElementById("game");
      const context = canvas.getContext("2d");
      const scoreNode = document.getElementById("score");
      const helpNode = document.getElementById("help");
      let width = 0;
      let height = 0;
      let scale = 1;
      let lastTime = performance.now();
      let state;

      function resize() {
        scale = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * scale);
        canvas.height = Math.floor(height * scale);
        context.setTransform(scale, 0, 0, scale, 0, 0);
      }

      function reset() {
        state = {
          started: false,
          over: false,
          time: 0,
          score: 0,
          lane: 0,
          angle: -Math.PI / 2,
          speed: 1.85,
          spawn: 0.75,
          gates: [],
          rings: []
        };
        scoreNode.textContent = "Score 000";
        helpNode.textContent = "Space / click / tap to switch orbit";
      }

      function input() {
        if (state.over) {
          reset();
          state.started = true;
          return;
        }
        state.started = true;
        state.lane = state.lane === 0 ? 1 : 0;
        helpNode.textContent = "Switch early. Stay calm.";
      }

      function polar(angle, radius) {
        return {
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * radius
        };
      }

      function spawnGate() {
        const lane = Math.random() > 0.5 ? 1 : 0;
        state.gates.push({
          lane,
          angle: -Math.PI / 2 - Math.random() * 0.45,
          size: 0.3
        });
        if (Math.random() > 0.45) {
          state.rings.push({
            lane: lane === 0 ? 1 : 0,
            angle: -Math.PI / 2 - 0.35,
            taken: false
          });
        }
      }

      function update(delta) {
        if (!state.started || state.over) return;
        state.time += delta;
        state.score += delta * 16;
        state.speed = 1.85 + Math.min(1.35, state.time * 0.035);
        state.angle += delta * state.speed;
        state.spawn -= delta;
        if (state.spawn <= 0) {
          spawnGate();
          state.spawn = Math.max(0.34, 0.9 - state.time * 0.01);
        }

        for (const gate of state.gates) gate.angle += delta * state.speed;
        for (const ring of state.rings) ring.angle += delta * state.speed;
        state.gates = state.gates.filter((gate) => gate.angle < Math.PI * 1.65);
        state.rings = state.rings.filter((ring) => ring.angle < Math.PI * 1.65 && !ring.taken);

        const shipAngle = Math.PI / 2;
        for (const gate of state.gates) {
          if (gate.lane === state.lane && Math.abs(gate.angle - shipAngle) < gate.size) {
            state.over = true;
            helpNode.textContent = "Crash. Tap to restart.";
          }
        }

        for (const ring of state.rings) {
          if (ring.lane === state.lane && Math.abs(ring.angle - shipAngle) < 0.2) {
            ring.taken = true;
            state.score += 250;
          }
        }

        scoreNode.textContent = "Score " + String(Math.floor(state.score)).padStart(3, "0");
      }

      function drawOrbit(radius, color) {
        context.strokeStyle = color;
        context.lineWidth = 3;
        context.beginPath();
        context.arc(width / 2, height / 2, radius, 0, Math.PI * 2);
        context.stroke();
      }

      function draw() {
        context.clearRect(0, 0, width, height);
        const minSide = Math.min(width, height);
        const inner = minSide * 0.21;
        const outer = minSide * 0.32;

        const gradient = context.createRadialGradient(width / 2, height / 2, 20, width / 2, height / 2, minSide * 0.62);
        gradient.addColorStop(0, "#16243a");
        gradient.addColorStop(1, "#060910");
        context.fillStyle = gradient;
        context.fillRect(0, 0, width, height);

        drawOrbit(inner, "rgba(81,216,255,.34)");
        drawOrbit(outer, "rgba(255,255,255,.18)");

        context.fillStyle = "#51d8ff";
        context.shadowColor = "#51d8ff";
        context.shadowBlur = 22;
        context.beginPath();
        context.arc(width / 2, height / 2, 16, 0, Math.PI * 2);
        context.fill();
        context.shadowBlur = 0;

        for (const gate of state.gates) {
          const radius = gate.lane === 0 ? inner : outer;
          const point = polar(gate.angle, radius);
          context.save();
          context.translate(point.x, point.y);
          context.rotate(gate.angle + Math.PI / 2);
          context.fillStyle = "#ff4d64";
          context.fillRect(-26, -8, 52, 16);
          context.restore();
        }

        for (const ring of state.rings) {
          const radius = ring.lane === 0 ? inner : outer;
          const point = polar(ring.angle, radius);
          context.strokeStyle = "#ffe66b";
          context.lineWidth = 4;
          context.beginPath();
          context.arc(point.x, point.y, 12, 0, Math.PI * 2);
          context.stroke();
        }

        const shipRadius = state.lane === 0 ? inner : outer;
        const ship = polar(Math.PI / 2, shipRadius);
        context.save();
        context.translate(ship.x, ship.y);
        context.rotate(Math.PI / 2);
        context.fillStyle = state.over ? "#ff4d64" : "#ffffff";
        context.beginPath();
        context.moveTo(18, 0);
        context.lineTo(-12, -10);
        context.lineTo(-7, 0);
        context.lineTo(-12, 10);
        context.closePath();
        context.fill();
        context.restore();

        if (!state.started) {
          context.fillStyle = "rgba(0,0,0,.42)";
          context.fillRect(0, 0, width, height);
          context.fillStyle = "#f8fbff";
          context.textAlign = "center";
          context.font = "900 34px Segoe UI, Arial";
          context.fillText("Orbit Shift", width / 2, height / 2 - 16);
          context.font = "700 15px Segoe UI, Arial";
          context.fillText("Tap to switch between orbit lanes", width / 2, height / 2 + 18);
        }
      }

      function loop(now) {
        const delta = Math.min((now - lastTime) / 1000, 0.033);
        lastTime = now;
        update(delta);
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          input();
        }
      });
      window.addEventListener("pointerdown", input);

      resize();
      reset();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
