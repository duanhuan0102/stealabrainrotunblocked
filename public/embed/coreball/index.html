<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Core Ball</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="coreball.css" />
</head>
<body>
  <div id="levelText" class="level-text">Level 1</div>
  <ul id="pan" class="roller"></ul>
  <ul id="ball"></ul>

  <div id="message" class="message" aria-live="assertive">
    <div class="message-box">
      <p id="messageKicker">Level 1</p>
      <h1 id="messageTitle">Success</h1>
      <button id="messageButton" type="button">Next Level</button>
    </div>
  </div>

  <script src="coreball.js"></script>
</body>
</html>
